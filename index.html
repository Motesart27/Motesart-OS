<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Motesart OS" />
    <meta name="theme-color" content="#c9a84c" />
    <title>Motesart OS</title>
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; }
      input::placeholder { color: rgba(255,255,255,0.25); }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
      @media (max-width: 768px) {
        #root { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .os-sidebar { width: 100% !important; height: 60px !important; flex-direction: row !important; border-right: none !important; border-top: 1px solid rgba(255,255,255,0.07) !important; position: fixed !important; bottom: 0 !important; left: 0 !important; right: 0 !important; z-index: 100 !important; overflow-x: auto !important; overflow-y: hidden !important; padding-bottom: env(safe-area-inset-bottom) !important; }
        .os-sidebar > *:first-child, .os-sidebar > *:nth-child(2) { display: none !important; }
        .os-sidebar > *:nth-child(3) { flex-direction: row !important; padding: 4px 8px !important; flex: 1 !important; overflow-x: auto !important; align-items: center !important; }
        .os-sidebar > *:nth-child(3) button { margin-bottom: 0 !important; margin-right: 4px !important; flex-shrink: 0 !important; }
        .os-sidebar > *:last-child { flex-direction: row !important; border-top: none !important; border-left: 1px solid rgba(255,255,255,0.07) !important; padding: 4px 8px !important; gap: 4px !important; align-items: center !important; }
        .os-main { padding-bottom: calc(60px + env(safe-area-inset-bottom)) !important; }
        .os-content-area { padding: 14px !important; }
        .os-pa-pill { bottom: calc(72px + env(safe-area-inset-bottom)) !important; right: 14px !important; }
        [style*="position: fixed"][style*="width: 380px"], [style*="position: fixed"][style*="width: 340px"], [style*="position: fixed"][style*="width: 360px"] { width: 100% !important; left: 0 !important; }
      }
      @media (max-width: 480px) { .os-content-area { padding: 10px !important; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
